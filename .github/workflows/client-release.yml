name: Build & Release Client

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-client:
    name: 🎮 Client EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" | sed 's/v//' >> $env:GITHUB_OUTPUT

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build Client JAR
        run: mvn clean package -P client -DskipTests

      - name: Build EXE
        run: mvn jpackage:jpackage -P client -Dapp.version=${{ steps.version.outputs.VERSION }}

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/dist/*.exe