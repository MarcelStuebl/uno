name: Build & Release Client

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:

  build-server:
    name: 🖥️ Server JAR
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build server-all.jar
        run: mvn clean package -P server -DskipTests

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/server-all.jar

  build-client:
    name: 🎮 Client EXE
    if: github.ref == 'refs/heads/master'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build Client JAR
        run: mvn clean package -P client -DskipTests

      - name: Build EXE
        run: mvn jpackage:jpackage -P client

      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNO-Client-EXE
          path: target/dist/*.exe